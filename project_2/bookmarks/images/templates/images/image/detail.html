{% extends "base.html" %}

{% block title %}
{{ image.title }}
{% endblock %}

{% block content %}
  <h1>{{ image.title }}</h1>

  {% if image.image %}
    <img src="{{ image.image.url }}" alt="{{ image.title }}" width="600">
  {% endif %}

  {% if image.description %}
    <p>{{ image.description }}</p>
  {% endif %}

{% endblock %}
